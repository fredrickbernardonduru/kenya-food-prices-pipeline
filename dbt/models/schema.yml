version: 2

sources:
  - name: public
    database: kenya_food_prices
    schema: public
    tables:
      - name: raw_food_prices
        description: "Raw food price data loaded by the Airflow ETL pipeline"
        columns:
          - name: date
            tests: [not_null]
          - name: price
            tests: [not_null]
          - name: market_id
            tests: [not_null]
          - name: commodity_id
            tests: [not_null]

models:
  - name: stg_food_prices
    description: "Cleaned and typed staging view over raw_food_prices"
    columns:
      - name: price_kes
        tests: [not_null]
      - name: market_id
        tests: [not_null]
      - name: commodity_id
        tests: [not_null]

  - name: dim_market
    description: "One row per unique market location"
    columns:
      - name: market_id
        tests: [not_null, unique]

  - name: dim_commodity
    description: "One row per unique commodity"
    columns:
      - name: commodity_id
        tests: [not_null, unique]

  - name: dim_date
    description: "One row per distinct month in the dataset"
    columns:
      - name: date_id
        tests: [not_null, unique]

  - name: fact_prices
    description: "Grain-level price facts"
    columns:
      - name: price_id
        tests: [not_null, unique]
      - name: price_kes
        tests: [not_null]

  - name: agg_monthly_prices
    description: "Monthly average prices per commodity per county — used by dashboards"